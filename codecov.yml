coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, components, files"
  require_changes: false

ignore:
  - "protos"
  - "ydb-api-protos"
  - "examples"
  - "slo-workload"
  - "tests"
  - "php_plugin"
  - "vendor"

component_management:
  individual_components:
    - component_id: native-sdk
      name: Native SDK
      paths:
        - "src/**"
