name: linter

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRPC_VERSION: '1.51.1'
  CACHE_VERSION: 'v1'

jobs:
  linter:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: [ '7.2' ]

    steps:
      - uses: actions/checkout@v3
        name: Checkout

      - uses: shivammathur/setup-php@v2
        name: Setup PHP
        id: php
        with:
          php-version: ${{ matrix.php-versions }}

      - name: Resolve extension dir
        run: echo "EXT_DIR=$(php-config --extension-dir)" >> "$GITHUB_ENV"

      - name: Restore PHP grpc extension
        id: grpc-cache
        uses: actions/cache@v3
        with:
          path: ${{ env.EXT_DIR }}/grpc.so
          key: php-grpc-${{ matrix.php-versions }}-${{ runner.os }}-grpc${{ env.GRPC_VERSION }}-${{ env.CACHE_VERSION }}

      - uses: eWaterCycle/setup-grpc@v5
        if: steps.grpc-cache.outputs.cache-hit != 'true'
        name: Setup gRPC
        with:
          grpc-version: ${{ env.GRPC_VERSION }}

      - name: Build grpc PHP extension
        if: steps.grpc-cache.outputs.cache-hit != 'true'
        run: sudo pecl install grpc

      - name: Enable grpc extension
        run: |
          INI_DIR=$(php -r 'echo PHP_CONFIG_FILE_SCAN_DIR;')
          echo "extension=grpc.so" | sudo tee "$INI_DIR/20-grpc.ini"
          php -m | grep -i grpc

      - run: composer validate --strict
        name: Validate composer.json and composer.lock

      - uses: actions/cache@v3
        name: Cache Composer packages
        id: composer-cache

        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: ./vendor/bin/phplint \
          ./ --exclude=vendor
